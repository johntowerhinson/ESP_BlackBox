<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP_BlackBox</title>
    <link rel="icon" href="data:,">
    <style>
        body { margin: 0; background: #0a0a0c; color: #00f5d4; font-family: monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00f5d4; pointer-events: none; }
    </style>
    <script src="three.min.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <h1>BlackBox</h1>
        <p>Temp: <span id="temp">--</span>°C</p>
        <p>GPS: <span id="gps">--</span></p>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 10);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let car;
        new THREE.GLTFLoader().load('car.glb', (gltf) => { car = gltf.scene; scene.add(car); });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        setInterval(async () => {
            const res = await fetch('/data');
            const data = await res.json();
            document.getElementById('temp').innerText = data.temp?.toFixed(1);
            document.getElementById('gps').innerText = data.lat?.toFixed(4) + ", " + data.lng?.toFixed(4);
            
            if(car) {
                // Apply absolute tilt
                car.rotation.x = THREE.MathUtils.degToRad(data.pitch);
                car.rotation.z = THREE.MathUtils.degToRad(data.roll);
            }
        }, 200);
    </script>
</body>
</html>
